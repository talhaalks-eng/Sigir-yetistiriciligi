<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lütfi Talha Alkış | Ziraat Mühendisi Portfolyo</title>
    <style>
        /* TEMEL STİLLER */
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #fdfdfd; color: #333; line-height: 1.6; }
        nav { background: #1b4d3e; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; }
        .container { max-width: 1100px; margin: 50px auto; padding: 20px; }
        .section-title { color: #1b4d3e; border-left: 5px solid #27ae60; padding-left: 15px; margin-bottom: 40px; font-size: 2rem; }

        /* OYUN MERKEZİ PANELİ */
        #game-center {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #eee;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 15px 25px;
            border: 2px solid #1b4d3e;
            background: transparent;
            color: #1b4d3e;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: #1b4d3e;
            color: white;
        }

        /* OYUN ALANLARI */
        .game-content { display: none; animation: fadeIn 0.5s ease; }
        .game-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MÜHENDİS MODU STİLLERİ (SADE) */
        .slider-box { max-width: 500px; margin: 0 auto 20px; text-align: left; background: #f9f9f9; padding: 20px; border-radius: 10px; }
        input[type=range] { width: 100%; accent-color: #27ae60; }

        /* ARCADE MODU STİLLERİ (ANİMASYONLU) */
        canvas { background: #e8f5e9; border-radius: 10px; cursor: crosshair; max-width: 100%; border: 1px solid #ddd; }
        .game-bars { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .bar-mini { width: 150px; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .fill-mini { height: 100%; width: 0%; transition: 0.3s; }

        .btn-action { background: #27ae60; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        footer { text-align: center; padding: 40px; background: #1b4d3e; color: white; margin-top: 100px; }
    </style>
</head>
<body>

<nav>
    <a href="#uzmanlik">Uzmanlık</a>
    <a href="#game-center">Simülasyon Merkezi</a>
    <a href="#iletisim">İletişim</a>
</nav>

<div class="container">
    <h2 class="section-title">Teknik Uzmanlık ve Deneyim</h2>
    <div id="game-center">
        <h2 style="color: #1b4d3e;">🌾 Hayvancılık Simülasyon Merkezi</h2>
        <p>Lütfen deneyimlemek istediğiniz modu seçin:</p>
        
        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('engineer')">🛠️ Mühendis Modu</button>
            <button class="mode-btn" onclick="switchMode('arcade')">🎮 Arcade Modu</button>
        </div>

        <div id="engineer-mode" class="game-content active">
            <div class="slider-box">
                <label>Ham Protein: %<span id="p-val">12</span></label>
                <input type="range" id="p-slider" min="10" max="22" value="12" oninput="updateEng()">
            </div>
            <div class="slider-box">
                <label>Net Enerji (NEL): <span id="e-val">1.4</span> Mcal/kg</label>
                <input type="range" id="e-slider" min="1.0" max="2.2" step="0.1" value="1.4" oninput="updateEng()">
            </div>
            <button class="btn-action" onclick="checkEngRation()">Rasyonu Analiz Et</button>
            <p id="eng-result" style="margin-top: 15px; font-weight: bold;"></p>
        </div>

        <div id="arcade-mode" class="game-content">
            <canvas id="arcadeCanvas" width="600" height="300"></canvas>
            <div class="game-bars">
                <div>Protein: <div class="bar-mini"><div id="p-fill" class="fill-mini" style="background: #27ae60;"></div></div></div>
                <div>Enerji: <div class="bar-mini"><div id="e-fill" class="fill-mini" style="background: #f1c40f;"></div></div></div>
            </div>
            <p id="arcade-msg" style="margin-top: 10px; font-weight: bold; color: #27ae60;"></p>
        </div>
    </div>

    <h2 id="iletisim" class="section-title" style="margin-top: 80px;">İletişim</h2>
    <p>📧 talhaalks@gmail.com</p>
</div>

<footer>Lütfi Talha Alkış &copy; 2026</footer>

<script>
    // MOD DEĞİŞTİRME
    function switchMode(mode) {
        document.querySelectorAll('.game-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        
        if(mode === 'engineer') {
            document.getElementById('engineer-mode').classList.add('active');
            event.target.classList.add('active');
            stopArcade();
        } else {
            document.getElementById('arcade-mode').classList.add('active');
            event.target.classList.add('active');
            startArcade();
        }
    }

    // --- MÜHENDİS MODU MANTIĞI ---
    function updateEng() {
        document.getElementById('p-val').innerText = document.getElementById('p-slider').value;
        document.getElementById('e-val').innerText = document.getElementById('e-slider').value;
    }
    function checkEngRation() {
        const p = document.getElementById('p-slider').value;
        const e = document.getElementById('e-slider').value;
        const res = document.getElementById('eng-result');
        if(p >= 16 && p <= 18 && e >= 1.7 && e <= 1.9) {
            res.innerText = "🎯 Mükemmel Rasyon!"; res.style.color = "green";
        } else { res.innerText = "❌ Değerleri Optimize Etmelisin."; res.style.color = "red"; }
    }

    // --- ARCADE MODU MANTIĞI ---
    const canvas = document.getElementById('arcadeCanvas');
    const ctx = canvas.getContext('2d');
    let arcActive = false;
    let pScore = 0, eScore = 0;
    let cowX = 270;
    let items = [];

    function startArcade() { 
        arcActive = true; pScore = 0; eScore = 0; items = [];
        document.getElementById('arcade-msg').innerText = "";
        requestAnimationFrame(gameLoop); 
    }
    function stopArcade() { arcActive = false; }

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        cowX = e.clientX - rect.left - 25;
    });

    function gameLoop() {
        if(!arcActive) return;
        ctx.clearRect(0,0,600,300);
        
        // İnek
        ctx.font = "40px Arial";
        ctx.fillText("🐄", cowX, 280);

        // Nesneler
        if(Math.random() < 0.03) items.push({x: Math.random()*570, y: 0, type: Math.random()>0.5?'🌾':'🌽'});

        items.forEach((it, i) => {
            it.y += 3;
            ctx.fillText(it.type, it.x, it.y);
            
            // Yakalama
            if(it.y > 240 && it.x > cowX - 20 && it.x < cowX + 40) {
                if(it.type === '🌾') pScore = Math.min(100, pScore + 5);
                else eScore = Math.min(100, eScore + 5);
                items.splice(i, 1);
            }
        });

        document.getElementById('p-fill').style.width = pScore + "%";
        document.getElementById('e-fill').style.width = eScore + "%";

        if(pScore >= 100 && eScore >= 100) {
            document.getElementById('arcade-msg').innerText = "🏆 Sürü Besleme Başarılı!";
            arcActive = false;
        }
        
        if(arcActive) requestAnimationFrame(gameLoop);
    }
</script>

</body>
</html>
